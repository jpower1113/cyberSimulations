<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Group 21 Cyber Range</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f0f0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .panel { display: flex; gap: 20px; }
        .controls, .logs { flex: 1; }
        button { padding: 10px 20px; cursor: pointer; background: #d9534f; color: white; border: none; border-radius: 4px; font-size: 16px; }
        button:hover { background: #c9302c; }
        pre { background: #333; color: #0f0; padding: 10px; overflow-x: auto; height: 300px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Defensive Framework Tester (Group 21)</h1>

        <div class="panel">
            <div class="controls">
                <h3>Select Attack Simulation</h3>
                <select id="simType" style="padding: 10px; width: 100%; margin-bottom: 10px;">
                    <option value="sqli">SQL Injection (SQLi)</option>
                    <option value="xss">Cross-Site Scripting (XSS)</option>
                    <option value="flood">HTTP Flood (Load Test)</option>
                    <option value="brute">Brute Force Login</option>
                </select>
                <button onclick="runSim()">Run Simulation</button>

                <h3>Simulation Output</h3>
                <pre id="simOutput">Waiting for command...</pre>
            </div>

            <div class="logs">
                <h3>Suricata Alerts (Live)</h3>
                <pre id="logOutput">Loading logs...</pre>
            </div>
        </div>
    </div>

    <script>
        async function runSim() {
            const type = document.getElementById('simType').value;
            document.getElementById('simOutput').innerText = "Running " + type + "...";

            const formData = new FormData();
            formData.append('type', type);

            try {
                const response = await fetch('/simulate', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById('simOutput').innerText = data.output;
                fetchLogs(); // Refresh logs immediately after run
            } catch (err) {
                document.getElementById('simOutput').innerText = "Error: " + err;
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/logs');
                const data = await response.json();
                document.getElementById('logOutput').innerText = data.logs || "No alerts found.";
            } catch (err) {
                console.error("Log fetch error", err);
            }
        }

        // Poll for logs every 2 seconds
        setInterval(fetchLogs, 2000);
        fetchLogs();
    </script>
</body>
</html>
